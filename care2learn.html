<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Care2Learn · Mandatory Training Platform</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Crect%20width%3D%27100%27%20height%3D%27100%27%20rx%3D%2722%27%20fill%3D%27%230D1B2A%27%2F%3E%3Cpath%20d%3D%27M50%2022%20L74%2030%20L74%2050%20C74%2064%2064%2073%2050%2078%20C36%2073%2026%2064%2026%2050%20L26%2030%20Z%27%20fill%3D%27%23ffffff%27%2F%3E%3Cpath%20d%3D%27M40%2051%20L47%2058%20L62%2040%27%20fill%3D%27none%27%20stroke%3D%27%2316A34A%27%20stroke-width%3D%276%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%2F%3E%3C%2Fsvg%3E">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F4F8;color:#1A1A2E}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}
  .hidden{display:none !important}

  /* ── Landing ── */
  .landing-hero{background:linear-gradient(135deg,#0D1B2A,#1B2A4A 50%,#1A3A5C);color:#fff;padding:56px 24px 44px;text-align:center}
  .landing-logo{font-size:48px;margin-bottom:10px}
  .landing-title{font-size:44px;font-weight:900;letter-spacing:-2px;margin-bottom:6px}
  .landing-tag{font-size:13px;color:#94A3B8;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
  .landing-desc{font-size:15px;color:#CBD5E1;max-width:520px;margin:0 auto 32px;line-height:1.7}
  .landing-stats{display:flex;justify-content:center;gap:36px;flex-wrap:wrap}
  .lstat-n{display:block;font-size:30px;font-weight:900;color:#3BAFDA}
  .lstat-l{font-size:11px;color:#64748B;text-transform:uppercase;letter-spacing:1px}
  .landing-cards{display:grid;grid-template-columns:1fr 1fr;gap:22px;padding:36px 24px;max-width:880px;margin:0 auto}
  @media(max-width:640px){.landing-cards{grid-template-columns:1fr}}
  .lcard{background:#fff;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
  .lcard-icon{font-size:38px;margin-bottom:14px}
  .lcard h2{font-size:21px;font-weight:800;margin-bottom:9px}
  .lcard p{font-size:14px;color:#5A6474;line-height:1.6;margin-bottom:22px}
  .btn-primary{width:100%;padding:13px;border:none;border-radius:10px;background:#1B2A4A;color:#fff;font-weight:700;font-size:14px;margin-bottom:10px;transition:opacity .2s}
  .btn-primary:hover{opacity:.85}
  .btn-primary.green{background:#27AE60}
  .btn-secondary{width:100%;padding:12px;border:2px solid #1B2A4A;border-radius:10px;background:transparent;color:#1B2A4A;font-weight:700;font-size:14px;transition:all .2s}
  .btn-secondary:hover{background:#1B2A4A;color:#fff}
  .footer{background:#1A1A2E;color:#64748B;text-align:center;padding:16px;font-size:12px}
  /* ── Pricing calculator ── */
  .plan-band{background:linear-gradient(160deg,#0D1B2A,#1B2A4A 55%,#1A3A5C);padding:46px 0}
  .plan{max-width:880px;margin:0 auto;padding:0 24px}
  .plan-head{text-align:center;margin-bottom:22px}
  .plan-head h2{font-size:26px;font-weight:800;color:#fff;margin-bottom:8px}
  .plan-head p{font-size:14px;color:#CBD5E1;line-height:1.6;max-width:580px;margin:0 auto}
  .plan-toggle{display:flex;background:rgba(255,255,255,.12);border-radius:30px;padding:5px;max-width:460px;margin:0 auto 22px;gap:4px}
  .plan-toggle button{flex:1;border:none;background:transparent;padding:11px 14px;border-radius:24px;font-size:14px;font-weight:700;color:#CBD5E1;cursor:pointer;transition:all .15s}
  .plan-toggle button.active{background:#fff;color:#1B2A4A;box-shadow:0 2px 6px rgba(0,0,0,.18)}
  .plan-toggle button span{font-size:11px;font-weight:600;color:#9FB0C4}
  .plan-toggle button.active span{color:#7A8599}
  .plan-card{display:grid;grid-template-columns:1fr 1fr;gap:28px;background:#fff;border:1px solid #E8ECF0;border-radius:16px;padding:30px;box-shadow:0 4px 22px rgba(13,27,42,.07)}
  .plan-left h3{font-size:20px;font-weight:800;color:#1B2A4A;margin-bottom:10px}
  .plan-left p{font-size:14px;color:#5A6474;line-height:1.6;margin-bottom:18px}
  .plan-list{list-style:none;padding:0;margin:0}
  .plan-list li{display:flex;align-items:flex-start;gap:9px;font-size:14px;color:#2C3E50;padding:6px 0}
  .plan-list li::before{content:"✓";color:#16A34A;font-weight:800;flex-shrink:0}
  .est{background:#2980B90D;border:1px solid #2980B926;border-radius:14px;padding:22px}
  .est-title{font-size:17px;font-weight:800;color:#1B2A4A;margin-bottom:18px}
  .est-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:#374151;margin-bottom:6px}
  .est-row b{font-size:24px;font-weight:900;color:#1B2A4A}
  .est input[type=range]{width:100%;accent-color:#2980B9;margin:2px 0 4px;cursor:pointer}
  .est-disc{font-size:12px;font-weight:700;color:#16A34A;min-height:15px;margin:2px 0 4px}
  .est-perlearner{font-size:13px;color:#5A6474;margin:16px 0 8px;font-weight:600}
  .est-perlearner span{color:#9AA5B1;font-weight:400}
  .est-cost{background:#fff;border-radius:10px;padding:14px;text-align:center;display:flex;align-items:baseline;justify-content:center;gap:8px}
  .est-cost-v{font-size:34px;font-weight:900;color:#2980B9;line-height:1}
  .est-cost-u{font-size:14px;color:#7A8599;font-weight:600}
  .est-sub{font-size:12px;color:#7A8599;text-align:center;margin-top:10px}
  .plan-cta{margin-top:16px;width:100%}
  @media(max-width:680px){.plan-card{grid-template-columns:1fr;gap:22px;padding:22px}.plan-head h2{font-size:22px}}

  /* ── Auth ── */
  .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .auth-card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:460px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
  .back-sm{background:none;border:none;color:#5A6474;font-size:13px;margin-bottom:18px;padding:0}
  .auth-logo{font-size:18px;font-weight:800;margin-bottom:14px}
  .auth-title{font-size:24px;font-weight:800;margin-bottom:6px}
  .auth-sub{font-size:14px;color:#7A8599;margin-bottom:22px}
  .err{background:#E74C3C18;border:1px solid #E74C3C44;color:#922B21;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
  .ok-banner{background:#27AE6018;border:1px solid #27AE6044;color:#1A5732;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
  .fg{margin-bottom:14px}
  .fg label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px}
  .inp{width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
  .inp:focus{border-color:#2980B9}
  .btn-auth{width:100%;padding:13px;border:none;border-radius:10px;background:#1B2A4A;color:#fff;font-weight:700;font-size:15px;margin-bottom:10px}
  .btn-demo{width:100%;padding:12px;border:2px dashed #94A3B8;border-radius:10px;background:transparent;color:#5A6474;font-weight:600;font-size:14px}
  .btn-demo:hover{border-color:#2980B9;color:#2980B9}

  /* ── Dashboard shell ── */
  .dash-hdr{background:#0D1B2A;color:#fff;padding:0 24px;display:flex;align-items:center;gap:16px;height:60px;position:sticky;top:0;z-index:50}
  .dash-brand{display:flex;align-items:center;gap:10px;min-width:180px}
  .dash-logo{font-size:24px}
  .dash-org{font-size:15px;font-weight:800}
  .dash-sub{font-size:10px;color:#94A3B8}
  .dash-nav{display:flex;gap:2px;flex:1;justify-content:center;flex-wrap:wrap}
  .nav-btn{background:transparent;border:none;color:#94A3B8;padding:8px 13px;border-radius:8px;font-size:13px;font-weight:600;transition:all .2s}
  .nav-btn.active,.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}
  .logout{background:rgba(255,255,255,.1);border:none;color:#94A3B8;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;flex:0 0 auto}
  .logout:hover{color:#fff}
  /* On narrow screens, stack the header: brand + Log Out on top, nav as its own scrollable row */
  @media(max-width:760px){
    .dash-hdr{height:auto;flex-wrap:wrap;padding:10px 14px;gap:10px}
    .dash-brand{order:1;flex:1 1 auto;min-width:0}
    .dash-sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .logout{order:2}
    .dash-nav{order:3;flex-basis:100%;width:100%;justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto;gap:4px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
    .nav-btn{flex:0 0 auto;white-space:nowrap}
  }
  .body{padding:24px;max-width:1200px;margin:0 auto}
  .hero h1{font-size:25px;font-weight:800;margin-bottom:4px}
  .hero p{color:#5A6474;font-size:14px;margin-bottom:22px}

  /* metrics */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
  @media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}}
  .metric{background:#fff;border-radius:12px;padding:18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .metric-i{font-size:22px;margin-bottom:6px}
  .metric-v{font-size:30px;font-weight:900;margin-bottom:3px}
  .metric-l{font-size:12px;color:#7A8599;font-weight:600}

  .sec-title{font-size:16px;font-weight:800;margin:6px 0 12px}
  .cc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:8px}
  .cc{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .cc-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .cc-name{flex:1;font-size:13px;font-weight:700}
  .cc-frac{font-size:12px;font-weight:700}
  .cc-bar{height:4px;background:#E8ECF0;border-radius:2px}
  .cc-fill{height:100%;border-radius:2px;transition:width .5s}

  /* section header w/ action */
  .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .sh h2{font-size:22px;font-weight:800}
  .btn-add{padding:10px 18px;border:none;border-radius:10px;background:#1B2A4A;color:#fff;font-weight:700;font-size:13px}
  .btn-add:hover{opacity:.85}

  /* staff table */
  .table{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .thead,.trow{display:grid;grid-template-columns:2fr 1.4fr 1.1fr 1.1fr .7fr 1.4fr;padding:13px 18px;align-items:center}
  .thead{background:#F4F6F9;font-size:11px;font-weight:700;color:#7A8599;text-transform:uppercase;letter-spacing:.5px}
  .trow{border-top:1px solid #F0F2F5;font-size:13px}
  .t-name{font-weight:700}.t-email{font-size:11px;color:#7A8599;font-weight:400}
  .t-role{color:#5A6474}
  .t-pin{font-family:monospace;font-weight:700;color:#2980B9;font-size:15px}
  .pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.green{background:#27AE6018;color:#1A5732}
  .pill.amber{background:#E67E2218;color:#7D6608}
  .pill.grey{background:#E5E7EB;color:#6B7280}
  .pill.red{background:#E74C3C18;color:#922B21}
  .row-actions{display:flex;gap:6px;flex-wrap:wrap}
  .abtn{padding:5px 11px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;font-size:12px;font-weight:600;color:#374151}
  .abtn:hover{border-color:#1B2A4A;color:#1B2A4A}
  .abtn.danger{color:#E74C3C;border-color:#E74C3C33}
  .abtn.danger:hover{background:#E74C3C;color:#fff}
  .empty{padding:36px;text-align:center;color:#7A8599;font-size:14px}

  /* card form */
  .cardform{background:#F0F4F8;border:2px solid #E5E7EB;border-radius:12px;padding:20px;margin-bottom:20px}
  .cardform h3{font-size:16px;font-weight:800;margin-bottom:16px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.row2{grid-template-columns:1fr}}
  .chk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin:6px 0 14px}
  .chk{display:flex;align-items:center;gap:8px;padding:8px 10px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;cursor:pointer;background:#fff}
  .chk input{cursor:pointer}
  .chk.on{border-color:#2980B9;background:#2980B910}
  .form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:6px}
  .btn-cancel{padding:9px 18px;border:2px solid #E5E7EB;border-radius:8px;background:#fff;font-weight:600;font-size:13px;color:#5A6474}
  .btn-save{padding:9px 18px;border:none;border-radius:8px;background:#27AE60;color:#fff;font-weight:700;font-size:13px}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-h{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 22px 0}
  .modal-h h2{font-size:21px;font-weight:800;margin-bottom:3px}
  .modal-h p{font-size:13px;color:#7A8599}
  .x{background:none;border:none;font-size:20px;color:#7A8599;line-height:1}
  .info-row{display:flex;gap:18px;flex-wrap:wrap;padding:12px 22px;background:#F0F4F8;margin-top:14px;font-size:12px;color:#5A6474}
  .crow{display:flex;align-items:center;gap:10px;padding:10px 22px;border-bottom:1px solid #F0F2F5}
  .crow-icon{font-size:20px}
  .crow-name{flex:1;font-size:13px;font-weight:600}
  .crow-meta{font-size:11px;color:#7A8599}
  .mini-bar{width:80px;height:5px;background:#E8ECF0;border-radius:3px;margin-top:3px}
  .mini-fill{height:100%;border-radius:3px}

  /* compliance matrix */
  .matrix{background:#fff;border-radius:12px;overflow:auto;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .mh,.mr{display:flex;align-items:center;padding:11px 14px;gap:7px}
  .mh{background:#F4F6F9;font-size:11px;font-weight:700;color:#7A8599;text-transform:uppercase;position:sticky;top:0}
  .mh span:first-child,.mr .m-name{min-width:150px;font-weight:700;font-size:13px}
  .mh span:not(:first-child){width:30px;text-align:center;font-size:15px}
  .mr{border-top:1px solid #F0F2F5}
  .cell{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;font-size:13px;font-weight:700}
  .cell.ok{background:#27AE6018;color:#27AE60}
  .cell.amber{background:#E67E2218;color:#E67E22}
  .cell.red{background:#E74C3C18;color:#E74C3C}
  .cell.prog{background:#2980B918;color:#2980B9}
  .cell.none{color:#BDC3C7}
  .legend{display:flex;gap:6px;align-items:center;padding:12px 4px;font-size:12px;color:#7A8599;flex-wrap:wrap}

  /* settings */
  .scard{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .scard h3{padding:16px 20px 0;font-size:15px;font-weight:700}
  .srow{display:flex;justify-content:space-between;padding:13px 20px;border-bottom:1px solid #F0F2F5;font-size:14px}
  .srow label{color:#7A8599;font-weight:600}
  .mono{font-family:monospace;font-size:12px;background:#F4F6F9;padding:3px 8px;border-radius:4px}

  /* staff course cards */
  .alert{background:#E67E2215;border:1px solid #E67E2240;color:#7D6608;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:18px}
  .obar-wrap{margin-bottom:20px}
  .obar-l{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#5A6474;margin-bottom:6px}
  .obar{height:6px;background:#E8ECF0;border-radius:3px}
  .obar-f{height:100%;background:linear-gradient(90deg,#27AE60,#3BAFDA);border-radius:3px;transition:width .5s}
  .sc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
  .sc{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;transition:transform .2s,box-shadow .2s}
  .sc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
  .sc-top{padding:18px;display:flex;justify-content:space-between;align-items:flex-start;min-height:70px}
  .sc-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:12px;color:#fff}
  .sc-body{padding:14px}
  .sc-title{font-size:15px;font-weight:800;margin-bottom:5px}
  .sc-meta{font-size:11px;color:#7A8599;margin-bottom:11px}
  .sc-cta{width:100%;padding:9px;border:none;border-radius:8px;color:#fff;font-weight:700;font-size:13px}
  .sc-done{display:flex;justify-content:space-between;align-items:center}
  .sc-score{font-size:18px;font-weight:900}
  .sc-exp{font-size:11px;color:#7A8599}

  /* player */
  .player-hdr{color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px}
  .back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600}
  .player-title{flex:1;display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700}
  .player-prog{font-size:12px;color:rgba(255,255,255,.65)}
  /* Modular course (Care Certificate) menu */
  .cc-menu{max-width:760px;margin:0 auto;padding:24px}
  .cc-head{text-align:center;margin-bottom:22px}
  .cc-head h2{font-size:24px;font-weight:800;color:#1B2A4A;margin-bottom:8px}
  .cc-head p{font-size:14px;color:#5A6474;line-height:1.6;max-width:560px;margin:0 auto 16px}
  .cc-prog{height:10px;background:#E8ECF0;border-radius:6px;overflow:hidden;max-width:420px;margin:0 auto 6px}
  .cc-prog-f{height:100%;border-radius:6px;transition:width .35s}
  .cc-prog-l{font-size:13px;color:#5A6474;font-weight:600}
  .cc-cert{background:#16A34A12;border:1px solid #16A34A40;border-radius:14px;padding:16px;text-align:center;max-width:420px;margin:0 auto 12px}
  .cc-cert b{color:#15803D;font-size:16px}
  .cc-cert p{font-size:13px;color:#5A6474;margin-top:4px}
  .cc-mods{display:flex;flex-direction:column;gap:10px;margin-top:10px}
  .cc-mod{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:#fff;border:1px solid #E8ECF0;border-radius:12px;padding:13px 16px;cursor:pointer;transition:all .15s}
  .cc-mod:hover{border-color:var(--c);box-shadow:0 4px 14px rgba(13,27,42,.08);transform:translateY(-1px)}
  .cc-mod.done{background:#16A34A08;border-color:#16A34A30}
  .cc-num{flex:0 0 auto;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .cc-mod-body{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
  .cc-mod-title{font-size:15px;font-weight:700;color:#1B2A4A}
  .cc-mod-sum{font-size:12px;color:#7A8599;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cc-mod-cta{flex:0 0 auto;font-size:13px;font-weight:700}
  @media(max-width:560px){.cc-mod-sum{display:none}}
  .dots{display:flex;align-items:center;gap:4px;padding:10px 24px;background:#fff;border-bottom:1px solid #E8ECF0}
  .dot{flex:1;height:4px;border-radius:2px;transition:background .3s}
  .pbody{padding:24px;max-width:820px;margin:0 auto}
  .slide{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  @media(max-width:640px){.slide{grid-template-columns:1fr}}
  .svis{background:#fff;border-radius:12px;padding:18px;min-height:200px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  CARE2LEARN — IN-BROWSER BACKEND
//  Mimics the Node server's REST API entirely in the browser so the platform
//  runs from a single file with no server. Data persists via localStorage
//  (with an in-memory fallback if storage is unavailable).
// ═══════════════════════════════════════════════════════════════════════════

// ── Persistent store (localStorage with in-memory fallback) ──
const _mem = {};
let _useLS = true;
try {
  const k = "__c2l_test__";
  window.localStorage.setItem(k, "1");
  window.localStorage.removeItem(k);
} catch (e) { _useLS = false; }

function _load(key, fallback) {
  if (_useLS) {
    try {
      const raw = window.localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) { return fallback; }
  }
  return _mem[key] !== undefined ? _mem[key] : fallback;
}
function _save(key, val) {
  if (_useLS) {
    try { window.localStorage.setItem(key, JSON.stringify(val)); return; } catch (e) {}
  }
  _mem[key] = val;
}

// ── Tables ──
const DB = {
  organisations: _load("c2l_orgs", []),
  staff: _load("c2l_staff", []),
  enrolments: _load("c2l_enrolments", []),
  sessions: _load("c2l_sessions", []),
};
function persist() {
  _save("c2l_orgs", DB.organisations);
  _save("c2l_staff", DB.staff);
  _save("c2l_enrolments", DB.enrolments);
  _save("c2l_sessions", DB.sessions);
}

// ── ID helpers ──
function rndHex(n) {
  let s = "";
  for (let i = 0; i < n; i++) s += Math.floor(Math.random() * 16).toString(16);
  return s.toUpperCase();
}
function genId(prefix) { return (prefix ? prefix + "-" : "") + rndHex(10); }
function genToken() { return rndHex(48); }
function genPin() { return String(Math.floor(1000 + Math.random() * 9000)); }

function addYear(dateStr) {
  const d = new Date(dateStr);
  d.setFullYear(d.getFullYear() + 1);
  return d.toISOString().split("T")[0];
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  return Math.ceil((new Date(dateStr) - new Date()) / 86400000);
}

// ── Compliance shaping (mirrors server) ──
function shapeEnrolment(row) {
  const course = COURSE_MAP[row.course_id];
  const days = daysUntil(row.expiry_date);
  let compliance = "not_started";
  if (row.status === "completed") {
    if (days === null) compliance = "valid";
    else if (days <= 0) compliance = "expired";
    else if (days <= 30) compliance = "expiring";
    else compliance = "valid";
  } else if (row.status === "in_progress") compliance = "in_progress";
  else if (row.status === "failed") compliance = "failed";
  return {
    id: row.id, courseId: row.course_id,
    courseTitle: course ? course.title : row.course_id,
    courseIcon: course ? course.icon : "📘",
    courseColor: course ? course.color : "#555",
    assignedAt: row.assigned_at, dueDate: row.due_date,
    status: row.status, progress: row.progress, score: row.score,
    attempts: row.attempts, completedAt: row.completed_at,
    expiryDate: row.expiry_date, certId: row.cert_id,
    daysUntilExpiry: days, compliance,
  };
}

  // Marcus — assigned only

  enr("STF-DEMO002", "manual-handling", { due_date: "2026-01-31" });

  persist();
}

//  LOCAL API ROUTER  — same signature & return shapes as the server version
// ═══════════════════════════════════════════════════════════════════════════
async function api(path, method = "GET", body) {
  // simulate a tiny delay so the UI feels real
  await new Promise(r => setTimeout(r, 60));
  const token = state.token;
  const err = (msg) => { throw new Error(msg); };

  // ── Public ──
  if (path === "/courses" && method === "GET") return { courses: COURSES };
  if (path === "/health") return { ok: true, time: new Date().toISOString() };

  // ── Org register ──
  if (path === "/org/register" && method === "POST") {
    if (!body.name || !body.email || !body.password) err("Name, email and password are required.");
    if (body.password.length < 6) err("Password must be at least 6 characters.");
    if (DB.organisations.some(o => o.email === body.email.toLowerCase())) err("An organisation with this email already exists.");
    const id = genId("ORG");
    DB.organisations.push({
      id, name: body.name, email: body.email.toLowerCase(), password: body.password,
      phone: body.phone || null, address: body.address || null,
      cqc_number: body.cqcNumber || null, created_at: new Date().toISOString(),
    });
    const tok = genToken();
    DB.sessions.push({ token: tok, subject_id: id, kind: "org", created_at: new Date().toISOString() });
    persist();
    const org = DB.organisations.find(o => o.id === id);
    return { token: tok, org: pubOrg(org) };
  }

  // ── Org login ──
  if (path === "/org/login" && method === "POST") {
    if (!body.email || !body.password) err("Email and password are required.");
    const org = DB.organisations.find(o => o.email === body.email.toLowerCase());
    if (!org) err("No organisation found with this email.");
    if (org.password !== body.password) err("Incorrect password.");
    const tok = genToken();
    DB.sessions.push({ token: tok, subject_id: org.id, kind: "org", created_at: new Date().toISOString() });
    persist();
    return { token: tok, org: pubOrg(org) };
  }

  // ── Org: me (dashboard) ──
  if (path === "/org/me" && method === "GET") {
    const s = sessionFor(token);
    if (!s || s.kind !== "org") err("Not authenticated as an organisation.");
    const org = DB.organisations.find(o => o.id === s.subject_id);
    if (!org) err("Organisation not found.");
    const orgStaff = DB.staff.filter(x => x.org_id === org.id);
    const activeStaff = orgStaff.filter(x => x.active);
    const staffIds = orgStaff.map(x => x.id);
    const allEnr = DB.enrolments.filter(e => staffIds.includes(e.staff_id));

    let fullyCompliant = 0, expiringSoon = 0;
    for (const member of activeStaff) {
      const mine = allEnr.filter(e => e.staff_id === member.id).map(shapeEnrolment);
      if (mine.length === 0) continue;
      if (mine.every(e => e.compliance === "valid")) fullyCompliant++;
      if (mine.some(e => e.compliance === "expiring")) expiringSoon++;
    }
    const byCourse = COURSES.map(c => {
      const enr = allEnr.filter(e => e.course_id === c.id);
      const completed = enr.map(shapeEnrolment).filter(e => e.compliance === "valid").length;
      return { courseId: c.id, title: c.title, icon: c.icon, color: c.color, assigned: enr.length, completed };
    });
    return {
      org: pubOrg(org),
      summary: { activeStaff: activeStaff.length, totalStaff: orgStaff.length, totalEnrolments: allEnr.length, fullyCompliant, expiringSoon },
      byCourse,
    };
  }

  // ── Org: list staff ──
  if (path === "/org/staff" && method === "GET") {
    const s = sessionFor(token);
    if (!s || s.kind !== "org") err("Not authenticated as an organisation.");
    const orgStaff = DB.staff.filter(x => x.org_id === s.subject_id)
      .sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
    const result = orgStaff.map(member => {
      const enr = DB.enrolments.filter(e => e.staff_id === member.id).map(shapeEnrolment);
      const completed = enr.filter(e => e.compliance === "valid").length;
      return {
        id: member.id, name: member.name, email: member.email, role: member.role,
        pin: member.pin, startDate: member.start_date, active: !!member.active,
        assignedCount: enr.length, completedCount: completed,
        compliant: enr.length > 0 && enr.every(e => e.compliance === "valid"),
        enrolments: enr,
      };
    });
    return { staff: result };
  }

  // ── Org: add staff ──
  if (path === "/org/staff" && method === "POST") {
    const s = sessionFor(token);
    if (!s || s.kind !== "org") err("Not authenticated.");
    if (!body.name || !body.email) err("Name and email are required.");
    const id = genId("STF");
    const pin = genPin();
    DB.staff.push({
      id, org_id: s.subject_id, name: body.name, email: body.email,
      role: body.role || "Care Assistant", pin,
      start_date: body.startDate || new Date().toISOString().split("T")[0],
      active: 1, created_at: new Date().toISOString(),
    });
    if (Array.isArray(body.courseIds)) {
      for (const cid of body.courseIds) {
        if (COURSE_IDS.includes(cid) && !DB.enrolments.some(e => e.staff_id === id && e.course_id === cid)) {
          DB.enrolments.push(newEnrolment(id, cid, body.dueDate));
        }
      }
    }
    persist();
    const member = DB.staff.find(x => x.id === id);
    return { staff: Object.assign({}, member, { active: !!member.active }), pin };
  }

  // ── Org: update staff (PATCH /org/staff/:id) ──
  let m = path.match(/^\/org\/staff\/([^/]+)$/);
  if (m && method === "PATCH") {
    const s = sessionFor(token);
    if (!s || s.kind !== "org") err("Not authenticated.");
    const member = DB.staff.find(x => x.id === m[1] && x.org_id === s.subject_id);
    if (!member) err("Staff member not found.");
    if (body.name !== undefined) member.name = body.name;
    if (body.role !== undefined) member.role = body.role;
    if (body.active !== undefined) member.active = body.active ? 1 : 0;
    persist();
    return { staff: Object.assign({}, member, { active: !!member.active }) };
  }

  // ── Org: enrol (POST /org/staff/:id/enrol) ──
  m = path.match(/^\/org\/staff\/([^/]+)\/enrol$/);
  if (m && method === "POST") {
    const s = sessionFor(token);
    if (!s || s.kind !== "org") err("Not authenticated.");
    const member = DB.staff.find(x => x.id === m[1] && x.org_id === s.subject_id);
    if (!member) err("Staff member not found.");
    const courseIds = Array.isArray(body.courseIds) ? body.courseIds : (body.courseId ? [body.courseId] : []);
    if (courseIds.length === 0) err("Provide courseId or courseIds.");
    let added = 0;
    for (const cid of courseIds) {
      if (!COURSE_IDS.includes(cid)) continue;
      if (DB.enrolments.some(e => e.staff_id === member.id && e.course_id === cid)) continue;
      DB.enrolments.push(newEnrolment(member.id, cid, body.dueDate));
      added++;
    }
    persist();
    const enrolments = DB.enrolments.filter(e => e.staff_id === member.id).map(shapeEnrolment);
    return { added, enrolments };
  }

  // ── Org: remove enrolment (DELETE /org/staff/:id/enrol/:courseId) ──
  m = path.match(/^\/org\/staff\/([^/]+)\/enrol\/([^/]+)$/);
  if (m && method === "DELETE") {
    const s = sessionFor(token);
    if (!s || s.kind !== "org") err("Not authenticated.");
    const member = DB.staff.find(x => x.id === m[1] && x.org_id === s.subject_id);
    if (!member) err("Staff member not found.");
    DB.enrolments = DB.enrolments.filter(e => !(e.staff_id === member.id && e.course_id === m[2]));
    persist();
    return { ok: true };
  }

  // ── Staff login ──
  if (path === "/staff/login" && method === "POST") {
    if (!body.email || !body.pin) err("Email and PIN are required.");
    const member = DB.staff.find(x => x.email === body.email && x.pin === String(body.pin) && x.active);
    if (!member) err("Incorrect email or PIN, or your licence is inactive.");
    const tok = genToken();
    DB.sessions.push({ token: tok, subject_id: member.id, kind: "staff", created_at: new Date().toISOString() });
    persist();
    const org = DB.organisations.find(o => o.id === member.org_id);
    return {
      token: tok,
      staff: { id: member.id, name: member.name, email: member.email, role: member.role, startDate: member.start_date, pin: member.pin },
      org: { id: org.id, name: org.name },
    };
  }

  // ── Staff: me ──
  if (path === "/staff/me" && method === "GET") {
    const s = sessionFor(token);
    if (!s || s.kind !== "staff") err("Not authenticated as staff.");
    const member = DB.staff.find(x => x.id === s.subject_id);
    if (!member) err("Staff not found.");
    const org = DB.organisations.find(o => o.id === member.org_id);
    const enrolments = DB.enrolments.filter(e => e.staff_id === member.id).map(shapeEnrolment);
    return {
      staff: { id: member.id, name: member.name, email: member.email, role: member.role, startDate: member.start_date, pin: member.pin },
      org: { id: org.id, name: org.name },
      enrolments,
    };
  }

  // ── Staff: progress ──
  if (path === "/staff/progress" && method === "POST") {
    const s = sessionFor(token);
    if (!s || s.kind !== "staff") err("Not authenticated as staff.");
    if (!body.courseId) err("courseId is required.");
    const e = DB.enrolments.find(x => x.staff_id === s.subject_id && x.course_id === body.courseId);
    if (!e) err("You are not enrolled on this course.");
    const progress = Math.max(0, Math.min(100, Number(body.progress) || 0));
    e.progress = progress;
    if (e.status !== "completed") e.status = progress > 0 ? "in_progress" : "assigned";
    persist();
    return { ok: true, enrolment: shapeEnrolment(e) };
  }

  // ── Staff: quiz ──
  if (path === "/staff/quiz" && method === "POST") {
    const s = sessionFor(token);
    if (!s || s.kind !== "staff") err("Not authenticated as staff.");
    if (!body.courseId || typeof body.score !== "number") err("courseId and numeric score are required.");
    const e = DB.enrolments.find(x => x.staff_id === s.subject_id && x.course_id === body.courseId);
    if (!e) err("You are not enrolled on this course.");
    const score = Math.max(0, Math.min(100, Math.round(body.score)));
    const passed = score >= 70;
    e.attempts = (e.attempts || 0) + 1;
    e.score = score;
    if (passed) {
      const completedAt = new Date().toISOString();
      e.status = "completed"; e.progress = 100;
      e.completed_at = completedAt;
      e.expiry_date = addYear(completedAt);
      e.cert_id = e.cert_id || genId("CERT");
    } else {
      e.status = "failed";
    }
    persist();
    return { passed, score, enrolment: shapeEnrolment(e) };
  }

  // ── Logout ──
  if (path === "/logout" && method === "POST") {
    DB.sessions = DB.sessions.filter(x => x.token !== token);
    persist();
    return { ok: true };
  }

  err("API route not found: " + method + " " + path);
}

function pubOrg(o) {
  return { id: o.id, name: o.name, email: o.email, phone: o.phone, address: o.address, cqc_number: o.cqc_number, created_at: o.created_at };
}
function newEnrolment(staff_id, course_id, dueDate) {
  return {
    id: genId("ENR"), staff_id, course_id, assigned_at: new Date().toISOString(),
    due_date: dueDate || null, status: "assigned", progress: 0, score: null,
    attempts: 0, completed_at: null, expiry_date: null, cert_id: null,
  };
}

// Seed on first load
seedDemo();

</script>
<script>
// ─── CARE2LEARN FRONTEND ──────────────────────────────────────────────────────
// Vanilla JS. No build step, no JSX, no bundler. Talks to the REST API.

const App = document.getElementById("app");
const state = {
  token: localStorage.getItem("c2l_token") || null,
  kind: localStorage.getItem("c2l_kind") || null, // 'org' | 'staff'
  courses: [],
  view: "landing",
};

// ── API helper ──

function setAuth(token, kind) {
  state.token = token; state.kind = kind;
  localStorage.setItem("c2l_token", token);
  localStorage.setItem("c2l_kind", kind);
}
function clearAuth() {
  state.token = null; state.kind = null;
  localStorage.removeItem("c2l_token");
  localStorage.removeItem("c2l_kind");
}

function el(html) {
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  return t.content.firstChild;
}
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function fmtDate(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
}
function toast(msg) {
  const t = el(`<div class="toast">${esc(msg)}</div>`);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Brand logo (shield + tick). dark=true gives a navy shield for light backgrounds. ──
function logoMark(size, dark) {
  const shield = dark ? "#1B2A4A" : "#ffffff";
  const tick = dark ? "#22C55E" : "#16A34A";
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 100 100" style="display:inline-block;vertical-align:middle;flex:0 0 auto" aria-label="Care2Learn">'
    + '<path d="M50 14 L80 24 L80 47 C80 65 67 77 50 83 C33 77 20 65 20 47 L20 24 Z" fill="' + shield + '"/>'
    + '<path d="M37 49 L46 58 L64 37" fill="none" stroke="' + tick + '" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>'
    + '</svg>';
}

// ── Checkout return handling ──
function checkCheckoutResult() {
  const c = new URLSearchParams(location.search).get("checkout");
  if (!c) return;
  history.replaceState(null, "", location.pathname);
  if (c === "success") toast("Payment received — thank you! We'll email you with access details shortly.");
  else if (c === "cancelled") toast("Checkout cancelled — no payment was taken.");
}

// ── Boot ──
async function boot() {
  checkCheckoutResult();
  App.innerHTML = `<div class="spin">Loading Care2Learn…</div>`;
  try {
    const { courses } = await api("/courses");
    state.courses = courses;
  } catch (e) {
    App.innerHTML = `<div class="spin">Could not reach the server.<br>Make sure it is running: <code>node server.js</code></div>`;
    return;
  }
  // Resume session if token present
  if (state.token && state.kind === "org") {
    try { await renderOrgDash(); return; } catch (e) { clearAuth(); }
  }
  if (state.token && state.kind === "staff") {
    try { await renderStaffPortal(); return; } catch (e) { clearAuth(); }
  }
  renderLanding();
}

// ─── LANDING ──────────────────────────────────────────────────────────────────
// ── Pricing model for the cost calculator. EDIT THESE to change your prices. ──
const PRICING = {
  currency: "£",
  subscriptionPerLearnerMonth: 2, // Subscription: £2 per learner per month (before discount)
  subDiscountPerStep: 10,         // ...discounted 10%...
  subDiscountStepUsers: 50,       // ...for every 50 learners...
  subDiscountMax: 50,             // ...up to a maximum of 50% off.
  paygPerCourse: 4,               // Pay as you go: £4 per course, per learner
};
// Subscription volume discount (%) for a given number of learners.
function subDiscountPct(users) {
  const steps = Math.floor(users / PRICING.subDiscountStepUsers);
  return Math.min(PRICING.subDiscountMax, steps * PRICING.subDiscountPerStep);
}
// Format a value given in pence as £X or £X.XX.
function fmtMoney(pence) {
  const pounds = pence / 100;
  const opts = Number.isInteger(pounds) ? {} : { minimumFractionDigits: 2, maximumFractionDigits: 2 };
  return PRICING.currency + pounds.toLocaleString(undefined, opts);
}

// Stripe payment link used as a fallback if server-side checkout is unavailable.
const STRIPE_PAYG_LINK = "https://buy.stripe.com/3cIfZg48PeVm93ncMOdZ602";

// Start pay-as-you-go checkout: ask the server to create a Stripe session for the
// exact amount (learners × courses × £4). If the server can't (not reachable, or the
// Stripe key isn't set yet), fall back to the fixed-price payment link.
async function startPaygCheckout(learners, courses) {
  toast("Setting up secure checkout…");
  try {
    const res = await fetch("/api/checkout/payg", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ learners, courses }),
    });
    if (res.ok) {
      const data = await res.json();
      if (data && data.url) { window.location.href = data.url; return; }
    }
  } catch (e) { /* fall through to the static link */ }
  window.open(STRIPE_PAYG_LINK, "_blank", "noopener");
}

// Build the interactive pricing calculator for the landing page.
function buildCalculator() {
  const courseCount = state.courses.length;
  const cur = PRICING.currency;
  const calc = { mode: "sub", learners: 30, courses: Math.min(3, courseCount) };

  const wrap = el(`
    <div class="plan-band">
      <div class="plan">
        <div class="plan-head">
          <h2>Flexible pricing that grows with you</h2>
          <p>Subscriptions suit small to large organisations. Running a micro business or working solo? Pay as you go gives you total flexibility.</p>
        </div>
        <div class="plan-toggle">
          <button data-mode="sub">Subscription <span>Most popular</span></button>
          <button data-mode="payg">Pay as you go</button>
        </div>
        <div class="plan-card" id="plan-card"></div>
      </div>
    </div>
  `);

  function render() {
    wrap.querySelectorAll(".plan-toggle button").forEach(b => b.classList.toggle("active", b.dataset.mode === calc.mode));
    const card = wrap.querySelector("#plan-card");

    if (calc.mode === "sub") {
      const disc = subDiscountPct(calc.learners);
      const perPence = Math.round(PRICING.subscriptionPerLearnerMonth * 100 * (1 - disc / 100));
      const monthlyPence = calc.learners * perPence;
      const yearlyPence = monthlyPence * 12;
      card.innerHTML = `
        <div class="plan-left">
          <h3>Subscribe & save</h3>
          <p>The most cost-effective way to keep your whole team compliant — one low monthly price per learner covers every mandatory course, with bigger discounts as your team grows.</p>
          <ul class="plan-list">
            <li>Just ${cur}${PRICING.subscriptionPerLearnerMonth} per learner / month</li>
            <li>Volume discounts — up to ${PRICING.subDiscountMax}% off</li>
            <li>All ${courseCount} mandatory courses included</li>
            <li>Unlimited certificates, renewals and reporting</li>
          </ul>
        </div>
        <div class="plan-right">
          <div class="est">
            <div class="est-title">Estimate your training costs</div>
            <div class="est-row"><span>Number of learners</span><b id="v-learn">${calc.learners}</b></div>
            <input type="range" id="s-learn" min="1" max="500" value="${calc.learners}">
            <div class="est-disc" id="v-disc">${disc > 0 ? disc + "% volume discount applied" : ""}</div>
            <div class="est-perlearner">Your estimated cost <span>(billed monthly)</span></div>
            <div class="est-cost"><span class="est-cost-v" id="v-total">${fmtMoney(monthlyPence)}</span><span class="est-cost-u">/ month</span></div>
            <div class="est-sub" id="v-sub">${fmtMoney(yearlyPence)} per year · ${fmtMoney(perPence)} per learner / month</div>
            <button class="btn-primary plan-cta" id="plan-cta">Get started</button>
          </div>
        </div>`;
      const sl = card.querySelector("#s-learn");
      sl.oninput = () => {
        calc.learners = +sl.value;
        const d = subDiscountPct(calc.learners);
        const pp = Math.round(PRICING.subscriptionPerLearnerMonth * 100 * (1 - d / 100));
        const mp = calc.learners * pp, yp = mp * 12;
        card.querySelector("#v-learn").textContent = calc.learners + (calc.learners >= 500 ? "+" : "");
        card.querySelector("#v-disc").textContent = d > 0 ? d + "% volume discount applied" : "";
        card.querySelector("#v-total").textContent = fmtMoney(mp);
        card.querySelector("#v-sub").textContent = fmtMoney(yp) + " per year · " + fmtMoney(pp) + " per learner / month";
      };
    } else {
      const total = calc.learners * calc.courses * PRICING.paygPerCourse;
      card.innerHTML = `
        <div class="plan-left">
          <h3>Pay as you go</h3>
          <p>No commitment — buy only the courses you need, when you need them, for ${cur}${PRICING.paygPerCourse} per learner. And unlike other providers, your courses never expire.</p>
          <ul class="plan-list">
            <li><strong>Your courses never expire — ever</strong></li>
            <li>No subscription or commitment</li>
            <li>${cur}${PRICING.paygPerCourse} per course, per learner</li>
            <li>Instant access, top up anytime</li>
          </ul>
        </div>
        <div class="plan-right">
          <div class="est">
            <div class="est-title">Estimate your training costs</div>
            <div class="est-row"><span>Number of learners</span><b id="v-learn">${calc.learners}</b></div>
            <input type="range" id="s-learn" min="1" max="500" value="${calc.learners}">
            <div class="est-row" style="margin-top:14px"><span>Number of courses</span><b id="v-course">${calc.courses}</b></div>
            <input type="range" id="s-course" min="1" max="${courseCount}" value="${calc.courses}">
            <div class="est-perlearner" style="margin-top:14px">Your estimated cost <span>(one-off)</span></div>
            <div class="est-cost"><span class="est-cost-v" id="v-total">${cur}${total.toLocaleString()}</span></div>
            <div class="est-sub" id="v-break">${calc.learners} learners × ${calc.courses} courses × ${cur}${PRICING.paygPerCourse}</div>
            <button class="btn-primary plan-cta" id="plan-cta">Buy now</button>
          </div>
        </div>`;
      const sl = card.querySelector("#s-learn");
      const sc = card.querySelector("#s-course");
      const upd = () => {
        calc.learners = +sl.value; calc.courses = +sc.value;
        const t = calc.learners * calc.courses * PRICING.paygPerCourse;
        card.querySelector("#v-learn").textContent = calc.learners + (calc.learners >= 500 ? "+" : "");
        card.querySelector("#v-course").textContent = calc.courses;
        card.querySelector("#v-total").textContent = cur + t.toLocaleString();
        card.querySelector("#v-break").textContent = calc.learners + " learners × " + calc.courses + " courses × " + cur + PRICING.paygPerCourse;
      };
      sl.oninput = upd; sc.oninput = upd;
    }
    card.querySelector("#plan-cta").onclick = (calc.mode === "payg")
      ? () => startPaygCheckout(calc.learners, calc.courses)
      : renderOrgRegister;
  }

  wrap.querySelectorAll(".plan-toggle button").forEach(b => {
    b.onclick = () => { calc.mode = b.dataset.mode; render(); };
  });
  render();
  return wrap;
}

function renderLanding() {
  App.innerHTML = "";
  App.appendChild(el(`
    <div>
      <div class="landing-hero">
        <div class="landing-logo">${logoMark(54, false)}</div>
        <div class="landing-title">Care2Learn</div>
        <div class="landing-tag">Skills for Care · Mandatory Training</div>
        <p class="landing-desc">The complete e-learning platform for social care. Register your organisation, assign mandatory courses to staff, and track every learner's progress and compliance in real time.</p>
        <div class="landing-stats">
          <div><span class="lstat-n">${state.courses.length}</span><span class="lstat-l">Courses</span></div>
          <div><span class="lstat-n">70%</span><span class="lstat-l">Pass Mark</span></div>
          <div><span class="lstat-n">1yr</span><span class="lstat-l">Certificate Validity</span></div>
          <div><span class="lstat-n">CQC</span><span class="lstat-l">Audit Ready</span></div>
        </div>
      </div>

async function paintOrgTab(org) {
  // refresh active nav
  const navs = document.querySelectorAll("#nav .nav-btn");

  navs.forEach((b,i)=> b.classList.toggle("active", keys[i]===orgTab));

  const body = document.getElementById("dashbody");
  body.innerHTML = `<div class="spin">Loading…</div>`;

  if (orgTab === "overview") {
    const me = await api("/org/me");
    body.innerHTML = "";
    const hour = new Date().getHours();
    body.appendChild(el(`<div class="hero"><h1>Good ${hour<12?"morning":hour<18?"afternoon":"evening"}! 👋</h1><p>Training compliance overview for ${esc(me.org.name)}.</p></div>`));
    const m = me.summary;
    body.appendChild(el(`
      <div class="metrics">
        <div class="metric"><div class="metric-i">👥</div><div class="metric-v" style="color:#2980B9">${m.activeStaff}</div><div class="metric-l">Active Staff</div></div>

        <div class="metric"><div class="metric-i">⚠️</div><div class="metric-v" style="color:#E67E22">${m.expiringSoon}</div><div class="metric-l">Expiring ≤30 days</div></div>
        <div class="metric"><div class="metric-i">📋</div><div class="metric-v" style="color:#9B59B6">${m.totalEnrolments}</div><div class="metric-l">Course Assignments</div></div>
      </div>
    `));
    body.appendChild(el(`<div class="sec-title">Compliance by Course</div>`));
    const grid = el(`<div class="cc-grid"></div>`);
    me.byCourse.forEach(c => {
      const total = m.activeStaff || 1;
      const pct = Math.round((c.completed / total) * 100);
      const color = pct >= 80 ? "#27AE60" : pct >= 50 ? "#E67E22" : "#E74C3C";
      grid.appendChild(el(`
        <div class="cc">
          <div class="cc-top"><span style="font-size:22px">${c.icon}</span><div style="flex:1"><div class="cc-name">${esc(c.title)}</div><div class="cc-frac" style="color:${color}">${c.completed}/${c.assigned||total}</div></div></div>
          <div class="cc-bar"><div class="cc-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>
      `));
    });
    body.appendChild(grid);
  }

  if (orgTab === "staff") {
    const { staff } = await api("/org/staff");
    body.innerHTML = "";
    const sh = el(`<div class="sh"><h2>Staff & Licences</h2><button class="btn-add" id="add">+ Add Staff Member</button></div>`);
    body.appendChild(sh);
    const formSlot = el(`<div id="formslot"></div>`);
    body.appendChild(formSlot);

    document.getElementById("add").onclick = () => showAddStaffForm(formSlot);

    if (staff.length === 0) {
      body.appendChild(el(`<div class="table"><div class="empty">No staff yet. Click "Add Staff Member" to create your first licence.</div></div>`));
    } else {
      const table = el(`<div class="table"><div class="thead"><span>Name</span><span>Role</span><span>Progress</span><span>Status</span><span>PIN</span><span>Actions</span></div></div>`);
      staff.forEach(s => {
        const statusPill = !s.active ? `<span class="pill grey">Inactive</span>`
          : s.compliant ? `<span class="pill green">✓ Compliant</span>`
          : s.assignedCount === 0 ? `<span class="pill grey">No courses</span>`
          : `<span class="pill amber">In Progress</span>`;
        const row = el(`
          <div class="trow">
            <span><div class="t-name">${esc(s.name)}</div><div class="t-email">${esc(s.email)}</div></span>
            <span class="t-role">${esc(s.role)}</span>
            <span><b style="color:${s.completedCount===s.assignedCount&&s.assignedCount>0?"#27AE60":"#E67E22"}">${s.completedCount}</b>/${s.assignedCount}</span>
            <span>${statusPill}</span>
            <span class="t-pin">${esc(s.pin)}</span>
            <span class="row-actions">
              <button class="abtn" data-act="view">Manage</button>
              ${s.active ? `<button class="abtn danger" data-act="deact">Deactivate</button>` : `<button class="abtn" data-act="react">Reactivate</button>`}

        const react = row.querySelector('[data-act="react"]');

    head.appendChild(el(`<span style="margin-left:auto;width:auto">Overall</span>`));
    matrix.appendChild(head);

    active.forEach(s => {
      const row = el(`<div class="mr"><span class="m-name">${esc(s.name)}</span></div>`);

      state.courses.forEach(c => {
        const enr = s.enrolments.find(e => e.courseId === c.id);
        let cls = "none", sym = "—";
        if (enr) {
          if (enr.compliance === "valid") { cls = "ok"; sym = "✓"; validCount++; }
          else if (enr.compliance === "expiring") { cls = "amber"; sym = "⚠"; validCount++; }
          else if (enr.compliance === "expired") { cls = "red"; sym = "✗"; }
          else if (enr.compliance === "in_progress") { cls = "prog"; sym = "◐"; }
          else if (enr.compliance === "failed") { cls = "red"; sym = "✗"; }
          else { cls = "none"; sym = "○"; }

        if (enr) cell.title = enr.courseTitle + " — " + enr.compliance + (enr.expiryDate ? " (until " + fmtDate(enr.expiryDate) + ")" : "");
        row.appendChild(cell);

      matrix.appendChild(row);
    });
    if (active.length === 0) matrix.appendChild(el(`<div class="empty">No active staff to report on.</div>`));
    body.appendChild(matrix);
    body.appendChild(el(`<div class="legend"><span class="cell ok">✓</span>Valid <span class="cell amber">⚠</span>Expiring <span class="cell prog">◐</span>In progress <span class="cell red">✗</span>Expired/Failed <span class="cell none">○</span>Assigned <span class="cell none">—</span>Not assigned</div>`));
  }

  if (orgTab === "settings") {
    const me = await api("/org/me");
    const o = me.org;
    body.innerHTML = "";
    body.appendChild(el(`<h2 style="margin-bottom:18px">Organisation Settings</h2>`));
    body.appendChild(el(`
      <div class="scard">
        <div class="srow"><label>Organisation Name</label><span>${esc(o.name)}</span></div>
        <div class="srow"><label>Email Address</label><span>${esc(o.email)}</span></div>
        <div class="srow"><label>Phone Number</label><span>${esc(o.phone||"Not provided")}</span></div>
        <div class="srow"><label>CQC Number</label><span>${esc(o.cqc_number||"Not provided")}</span></div>
        <div class="srow"><label>Address</label><span>${esc(o.address||"Not provided")}</span></div>
        <div class="srow"><label>Registered Since</label><span>${fmtDate(o.created_at)}</span></div>
        <div class="srow"><label>Organisation ID</label><span class="mono">${esc(o.id)}</span></div>
      </div>
      <div class="scard" style="margin-top:16px">
        <h3>Subscription</h3>
        <div style="padding:0 20px 16px"><span class="pill" style="background:#2980B918;color:#1A5276">Standard Plan</span><p style="font-size:13px;color:#5A6474;line-height:1.6;margin-top:8px">Unlimited staff licences · All ${state.courses.length} mandatory courses · Course assignment · Progress tracking · Certificate generation · CQC compliance report</p></div>
      </div>
    `));
  }
}

function showAddStaffForm(slot) {
  slot.innerHTML = "";
  const courseChecks = state.courses.map(c =>
    `<label class="chk" data-cid="${c.id}"><input type="checkbox" value="${c.id}"> ${c.icon} ${esc(c.title)}</label>`
  ).join("");
  const form = el(`
    <div class="cardform">
      <h3>Add New Staff Member</h3>
      <div id="aerr"></div>
      <div class="row2">
        <div class="fg"><label>Full Name *</label><input class="inp" id="a-name" placeholder="Jane Smith"></div>
        <div class="fg"><label>Email Address *</label><input class="inp" id="a-email" type="email" placeholder="jane@email.com"></div>
      </div>
      <div class="row2">
        <div class="fg"><label>Job Role</label>
          <select class="inp" id="a-role">
            ${["Care Assistant","Senior Carer","Team Leader","Deputy Manager","Registered Manager","Support Worker","Nurse","Other"].map(r=>`<option>${r}</option>`).join("")}
          </select>
        </div>
        <div class="fg"><label>Start Date</label><input class="inp" id="a-start" type="date" value="${new Date().toISOString().split("T")[0]}"></div>
      </div>
      <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">Assign Courses (optional)</label>
      <div class="chk-grid">${courseChecks}</div>
      <div class="form-actions"><button class="btn-cancel" id="a-cancel">Cancel</button><button class="btn-save" id="a-save">Create Licence</button></div>
    </div>
  `);
  slot.appendChild(form);

  form.querySelectorAll(".chk").forEach(lbl => {
    const cb = lbl.querySelector("input");
    cb.onchange = () => lbl.classList.toggle("on", cb.checked);
  });
  document.getElementById("a-cancel").onclick = () => slot.innerHTML = "";
  document.getElementById("a-save").onclick = async () => {
    const errBox = document.getElementById("aerr");
    errBox.innerHTML = "";
    const courseIds = [...form.querySelectorAll(".chk input:checked")].map(c => c.value);
    const payload = {
      name: val("a-name"), email: val("a-email"),
      role: document.getElementById("a-role").value,
      startDate: val("a-start"), courseIds,
    };
    if (!payload.name || !payload.email) { errBox.innerHTML = `<div class="err">Name and email are required.</div>`; return; }
    try {
      const { pin } = await api("/org/staff", "POST", payload);
      slot.innerHTML = "";
      toast(`✓ Licence created. Login PIN: ${pin}`);
      paintOrgTab(null);
    } catch (e) { errBox.innerHTML = `<div class="err">${esc(e.message)}</div>`; }
  };
}

// ── Staff management modal (assign/remove courses, view progress) ──
async function openStaffModal(staffId) {
  const { staff } = await api("/org/staff");
  const s = staff.find(x => x.id === staffId);
  if (!s) return;

  const assignedIds = s.enrolments.map(e => e.courseId);
  const available = state.courses.filter(c => !assignedIds.includes(c.id));

  const overlay = el(`<div class="overlay"></div>`);
  const modal = el(`
    <div class="modal">
      <div class="modal-h">
        <div><h2>${esc(s.name)}</h2><p>${esc(s.role)} · PIN ${esc(s.pin)}</p></div>
        <button class="x" id="close">✕</button>
      </div>
      <div class="info-row"><span>📧 ${esc(s.email)}</span><span>📅 Since ${fmtDate(s.startDate)}</span><span>${s.completedCount}/${s.assignedCount} completed</span></div>

      <div style="padding:18px 22px 6px"><b style="font-size:15px">Assigned Courses</b></div>
      <div id="assigned"></div>

      <div style="padding:14px 22px 6px;border-top:1px solid #F0F2F5;margin-top:8px"><b style="font-size:15px">Assign a New Course</b></div>
      <div style="padding:0 22px 18px" id="assign-slot"></div>
    </div>
  `);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  modal.querySelector("#close").onclick = () => overlay.remove();

  const assignedBox = modal.querySelector("#assigned");
  if (s.enrolments.length === 0) {
    assignedBox.appendChild(el(`<div style="padding:8px 22px;color:#7A8599;font-size:13px;font-style:italic">No courses assigned yet.</div>`));
  } else {
    s.enrolments.forEach(e => {
      const c = state.courses.find(x => x.id === e.courseId) || {};
      let badge;
      if (e.compliance === "valid") badge = `<span class="pill green">✓ ${e.score}% · valid to ${fmtDate(e.expiryDate)}</span>`;
      else if (e.compliance === "expiring") badge = `<span class="pill amber">⚠ expires ${fmtDate(e.expiryDate)}</span>`;
      else if (e.compliance === "expired") badge = `<span class="pill red">✗ expired ${fmtDate(e.expiryDate)}</span>`;
      else if (e.compliance === "in_progress") badge = `<span class="pill amber">◐ ${e.progress}% complete</span>`;
      else if (e.compliance === "failed") badge = `<span class="pill red">✗ failed (${e.score}%)</span>`;
      else badge = `<span class="pill grey">○ assigned</span>`;
      const row = el(`
        <div class="crow">
          <span class="crow-icon">${c.icon||"📘"}</span>
          <div style="flex:1"><div class="crow-name">${esc(e.courseTitle)}</div><div class="crow-meta">${badge}</div>
            <div class="mini-bar"><div class="mini-fill" style="width:${e.progress}%;background:${c.color||"#2980B9"}"></div></div>
          </div>
          <button class="abtn danger" data-remove="${e.courseId}">Remove</button>
        </div>
      `);
      row.querySelector("[data-remove]").onclick = async () => {
        await api(`/org/staff/${s.id}/enrol/${e.courseId}`, "DELETE");
        overlay.remove();
        toast("Course removed.");
        paintOrgTab(null);
        openStaffModal(s.id);
      };
      assignedBox.appendChild(row);
    });
  }

  const assignSlot = modal.querySelector("#assign-slot");
  if (available.length === 0) {
    assignSlot.appendChild(el(`<div style="color:#7A8599;font-size:13px;font-style:italic">All courses assigned.</div>`));
  } else {
    const sel = el(`<select class="inp" style="margin-bottom:10px">${available.map(c=>`<option value="${c.id}">${c.icon} ${esc(c.title)}</option>`).join("")}</select>`);
    const btn = el(`<button class="btn-save" style="width:100%">Assign Course</button>`);
    assignSlot.appendChild(sel);
    assignSlot.appendChild(btn);
    btn.onclick = async () => {
      await api(`/org/staff/${s.id}/enrol`, "POST", { courseId: sel.value });
      overlay.remove();
      toast("Course assigned.");
      paintOrgTab(null);
      openStaffModal(s.id);
    };
  }
}

// Render the visual for a slide based on its `visual` type
function renderSlideVisual(slide, course) {
  const c = course.color;
  const v = slide.visual || "icon";
  const d = slide.visualData || {};

  if (v === "stat" && d.stats) {
    return `<div class="vstat"><div class="vstat-icon">${course.icon}</div><div class="vstat-row">${
      d.stats.map(s => `<div class="vstat-card"><div class="vstat-n" style="color:${c}">${esc(s.n)}</div><div class="vstat-l">${esc(s.l)}</div></div>`).join("")
    }</div></div>`;
  }
  if (v === "grid" && d.items) {
    return `<div class="vgrid">${
      d.items.map((it, i) => `<div class="vgrid-item" style="border-left-color:${c}"><span class="vgrid-num" style="color:${c}">${i+1}</span>${esc(it)}</div>`).join("")
    }</div>`;
  }
  if (v === "flow" && d.steps) {
    return `<div class="vflow">${
      d.steps.map((s, i) => `<div class="vflow-step"><span class="vflow-num" style="background:${c}">${i+1}</span>${esc(s)}</div>${i < d.steps.length-1 ? `<div class="vflow-arr">↓</div>` : ""}`).join("")
    }</div>`;
  }
  if (v === "pillars" && d.items) {
    return `<div class="vpillars">${
      d.items.map(it => `<div class="vpillar" style="border-top-color:${c}">${esc(it)}</div>`).join("")
    }</div>`;
  }
  if (v === "compare" && d.left && d.right) {
    const col = (side, bg) => `<div class="vcol"><div class="vcol-h" style="background:${bg}">${esc(side.title)}</div><ul class="vcol-items">${side.items.map(i=>`<li>${esc(i)}</li>`).join("")}</ul></div>`;
    return `<div class="vcompare">${col(d.left, c)}${col(d.right, "#5A6474")}</div>`;
  }
  if (v === "cycle" && d.items) {
    return `<div class="vcycle">${
      d.items.map((it, i) => `<span class="vcycle-item" style="border-color:${c}">${esc(it)}</span>${i < d.items.length-1 ? `<span class="vcycle-arr">→</span>` : ""}`).join("")
    }</div>`;
  }
  // fallback
  return `<div class="svis-emoji">${course.icon}</div>`;
}

async function openCoursePlayer(courseId, me, opts) {
  const course = state.courses.find(c => c.id === courseId);
  if (!course) return;
  const enr = (me.enrolments || []).find(e => e.courseId === courseId);
  const alreadyStarted = enr && enr.progress > 0 && enr.status !== "completed";

  // stage: "intro" | "slides" | "quiz"
  let stage = (opts && opts.stage) || "intro";
  let slideIdx = 0;
  let inQuiz = false;

  function render() {
    App.innerHTML = "";
    const wrap = el(`<div></div>`);

    // ── INTRO SCREEN ──
    if (stage === "intro") {
      wrap.appendChild(el(`
        <div class="player-hdr" style="background:${course.color}">
          <button class="back-btn" id="pback">← Back to my courses</button>
          <div class="player-title"><span>${course.icon}</span><span>${esc(course.title)}</span></div>
          <div class="player-prog"></div>
        </div>
      `));
      const intro = el(`<div class="intro"></div>`);
      const card = el(`
        <div class="intro-card">
          <div class="intro-top" style="background:linear-gradient(135deg,${course.color},${course.color}cc)">
            <div class="intro-icon">${course.icon}</div>
            <div class="intro-title">${esc(course.title)}</div>
            <div class="intro-summary">${esc(course.summary || "")}</div>
            <div class="intro-meta">
              <div class="intro-meta-item"><span class="intro-meta-n">${course.slides.length}</span><span class="intro-meta-l">Sections</span></div>
              <div class="intro-meta-item"><span class="intro-meta-n">${course.quiz.length}</span><span class="intro-meta-l">Questions</span></div>
              <div class="intro-meta-item"><span class="intro-meta-n">⏱ ${esc(course.duration||"")}</span><span class="intro-meta-l">Duration</span></div>
              <div class="intro-meta-item"><span class="intro-meta-n">70%</span><span class="intro-meta-l">To pass</span></div>
            </div>
          </div>
          <div class="intro-body">
            ${alreadyStarted ? `<div class="intro-resume">You're ${enr.progress}% through this course — your progress is saved.</div>` : ""}
            <h3>📋 What you'll learn</h3>
            <ul class="obj-list">${
              (course.objectives||[]).map(o => `<li><span class="obj-check" style="background:${course.color}">✓</span>${esc(o)}</li>`).join("")
            }</ul>
            <button class="intro-start" id="startbtn" style="background:${course.color}">${alreadyStarted ? "Resume Course →" : "Begin Course →"}</button>
          </div>
        </div>
      `);
      intro.appendChild(card);
      wrap.appendChild(intro);
      App.appendChild(wrap);
      document.getElementById("pback").onclick = () => renderStaffPortal();
      document.getElementById("startbtn").onclick = () => { stage = "slides"; slideIdx = 0; render(); };
      return;
    }

    // ── HEADER (slides + quiz) ──
    wrap.appendChild(el(`
      <div class="player-hdr" style="background:${course.color}">
        <button class="back-btn" id="pback">← Back</button>
        <div class="player-title"><span>${course.icon}</span><span>${esc(course.title)}</span></div>
        <div class="player-prog">${inQuiz ? "Assessment" : `Section ${slideIdx+1} of ${course.slides.length}`}</div>
      </div>
    `));

    if (!inQuiz) {
      // progress bar instead of plain dots
      const pct = Math.round(((slideIdx) / course.slides.length) * 100);
      const dots = el(`<div class="dots"></div>`);
      course.slides.forEach((_, i) => dots.appendChild(el(`<div class="dot" style="background:${i <= slideIdx ? course.color : "#E0E0E0"}"></div>`)));
      wrap.appendChild(dots);

      const s = course.slides[slideIdx];
      const pbody = el(`<div class="pbody"></div>`);
      pbody.appendChild(el(`
        <div class="slide">
          <div class="svis">${renderSlideVisual(s, course)}</div>
          <div>
            <div style="font-size:11px;font-weight:700;color:${course.color};text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Section ${slideIdx+1}</div>
            <h2 style="color:${course.color}">${esc(s.heading)}</h2>
            <p class="slide-body-txt">${esc(s.body)}</p>
            <ul class="plist">${s.points.map(p => `<li><span class="pdot" style="background:${course.color}"></span>${esc(p)}</li>`).join("")}</ul>
          </div>
        </div>
      `));
      const nav = el(`<div class="snav"></div>`);
      if (slideIdx > 0) { const b = el(`<button class="btn-out" style="border-color:${course.color};color:${course.color}">← Previous</button>`); b.onclick = () => { slideIdx--; render(); }; nav.appendChild(b); }
      else { const b = el(`<button class="btn-out" style="border-color:#BDC3C7;color:#7A8599">← Overview</button>`); b.onclick = () => { stage = "intro"; render(); }; nav.appendChild(b); }
      nav.appendChild(el(`<div style="flex:1"></div>`));
      if (slideIdx < course.slides.length-1) { const b = el(`<button class="btn-go" style="background:${course.color}">Next →</button>`); b.onclick = async () => { slideIdx++; await saveProgress(); render(); }; nav.appendChild(b); }
      else { const b = el(`<button class="btn-go" style="background:${course.color}">📝 Start Assessment</button>`); b.onclick = async () => { inQuiz = true; await saveProgress(100); render(); }; nav.appendChild(b); }
      pbody.appendChild(nav);
      wrap.appendChild(pbody);
    } else {
      wrap.appendChild(renderQuiz(course, me, () => { openCoursePlayer(courseId, me, { stage: "slides" }); }));
    }

    App.appendChild(wrap);
    document.getElementById("pback").onclick = () => renderStaffPortal();
  }

  async function saveProgress(force) {
    const pct = force != null ? force : Math.round(((slideIdx+1) / (course.slides.length+1)) * 100);
    try { await api("/staff/progress", "POST", { courseId, progress: pct }); } catch (e) {}
  }

  render();
}

  if (!course || !Array.isArray(course.modules)) return openCoursePlayer(courseId, me);
  const enr = (me.enrolments || []).find(e => e.courseId === courseId) || { courseId, courseTitle: course.title };
  const completed = new Set(enr.modulesCompleted || []);

  function renderMenu() {
    App.innerHTML = "";
    const wrap = el(`<div></div>`);
    const total = course.modules.length;
    const doneCount = course.modules.filter(m => completed.has(m.id)).length;

    wrap.appendChild(el(`
      <div class="player-hdr" style="background:${course.color}">
        <button class="back-btn" id="pback">← Back to my courses</button>

        <div class="player-prog">${doneCount}/${total} complete</div>
