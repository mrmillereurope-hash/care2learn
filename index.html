<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Care2Learn · Mandatory Training Platform</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Crect%20width%3D%27100%27%20height%3D%27100%27%20rx%3D%2722%27%20fill%3D%27%230D1B2A%27%2F%3E%3Cpath%20d%3D%27M50%2022%20L74%2030%20L74%2050%20C74%2064%2064%2073%2050%2078%20C36%2073%2026%2064%2026%2050%20L26%2030%20Z%27%20fill%3D%27%23ffffff%27%2F%3E%3Cpath%20d%3D%27M40%2051%20L47%2058%20L62%2040%27%20fill%3D%27none%27%20stroke%3D%27%2316A34A%27%20stroke-width%3D%276%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%2F%3E%3C%2Fsvg%3E">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F4F8;color:#1A1A2E}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}
  .hidden{display:none !important}

  /* ── Landing ── */
  .landing-hero{background:linear-gradient(135deg,#0D1B2A,#1B2A4A 50%,#1A3A5C);color:#fff;padding:56px 24px 44px;text-align:center}
  .landing-logo{font-size:48px;margin-bottom:10px}
  .landing-title{font-size:44px;font-weight:900;letter-spacing:-2px;margin-bottom:6px}
  .landing-tag{font-size:13px;color:#94A3B8;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
  .landing-desc{font-size:15px;color:#CBD5E1;max-width:520px;margin:0 auto 32px;line-height:1.7}
  .landing-stats{display:flex;justify-content:center;gap:36px;flex-wrap:wrap}
  .lstat-n{display:block;font-size:30px;font-weight:900;color:#3BAFDA}
  .lstat-l{font-size:11px;color:#64748B;text-transform:uppercase;letter-spacing:1px}
  .landing-cards{display:grid;grid-template-columns:1fr 1fr;gap:22px;padding:36px 24px;max-width:880px;margin:0 auto}
  @media(max-width:640px){.landing-cards{grid-template-columns:1fr}}
  .lcard{background:#fff;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
  .lcard-icon{font-size:38px;margin-bottom:14px}
  .lcard h2{font-size:21px;font-weight:800;margin-bottom:9px}
  .lcard p{font-size:14px;color:#5A6474;line-height:1.6;margin-bottom:22px}
  .btn-primary{width:100%;padding:13px;border:none;border-radius:10px;background:#1B2A4A;color:#fff;font-weight:700;font-size:14px;margin-bottom:10px;transition:opacity .2s}
  .btn-primary:hover{opacity:.85}
  .btn-primary.green{background:#27AE60}
  .btn-secondary{width:100%;padding:12px;border:2px solid #1B2A4A;border-radius:10px;background:transparent;color:#1B2A4A;font-weight:700;font-size:14px;transition:all .2s}
  .btn-secondary:hover{background:#1B2A4A;color:#fff}
  .footer{background:#1A1A2E;color:#64748B;text-align:center;padding:16px;font-size:12px}
  /* ── Pricing calculator ── */
  .plan-band{background:linear-gradient(160deg,#0D1B2A,#1B2A4A 55%,#1A3A5C);padding:46px 0}
  .plan{max-width:880px;margin:0 auto;padding:0 24px}
  .plan-head{text-align:center;margin-bottom:22px}
  .plan-head h2{font-size:26px;font-weight:800;color:#fff;margin-bottom:8px}
  .plan-head p{font-size:14px;color:#CBD5E1;line-height:1.6;max-width:580px;margin:0 auto}
  .plan-toggle{display:flex;background:rgba(255,255,255,.12);border-radius:30px;padding:5px;max-width:460px;margin:0 auto 22px;gap:4px}
  .plan-toggle button{flex:1;border:none;background:transparent;padding:11px 14px;border-radius:24px;font-size:14px;font-weight:700;color:#CBD5E1;cursor:pointer;transition:all .15s}
  .plan-toggle button.active{background:#fff;color:#1B2A4A;box-shadow:0 2px 6px rgba(0,0,0,.18)}
  .plan-toggle button span{font-size:11px;font-weight:600;color:#9FB0C4}
  .plan-toggle button.active span{color:#7A8599}
  /* FAQ section */
  .faq-band{background:#F4F7FB;padding:50px 20px}
  .faq-inner{max-width:760px;margin:0 auto}
  .faq-head{text-align:center;margin-bottom:6px}
  .faq-head h2{font-size:26px;font-weight:800;color:#1B2A4A;margin-bottom:6px}
  .faq-head p{font-size:14px;color:#5A6474}
  .faq-toggle{display:flex;background:#E6ECF3;border-radius:30px;padding:5px;max-width:430px;margin:18px auto 22px;gap:4px}
  .faq-toggle button{flex:1;border:none;background:transparent;padding:10px 12px;border-radius:24px;font-size:14px;font-weight:700;color:#5A6474;cursor:pointer;transition:all .15s}
  .faq-toggle button.active{background:#fff;color:#1B2A4A;box-shadow:0 2px 6px rgba(0,0,0,.12)}
  .faq-list{display:flex;flex-direction:column;gap:10px}
  .faq-item{background:#fff;border:1px solid #E3E9F0;border-radius:12px;overflow:hidden}
  .faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px;background:none;border:none;text-align:left;font-size:15px;font-weight:700;color:#1B2A4A;cursor:pointer;line-height:1.4}
  .faq-q:hover{background:#F8FAFC}
  .faq-ico{flex:0 0 auto;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:300;color:#2980B9;transition:transform .2s}
  .faq-item.open .faq-ico{transform:rotate(45deg)}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .25s ease}
  .faq-item.open .faq-a{max-height:360px}
  .faq-a p{font-size:14px;color:#5A6474;line-height:1.65;margin:0;padding:0 18px 16px}
  /* Individual (self-employed) portal */
  .lcard-or{margin:14px 0 8px;font-size:12px;color:#7A8599;font-weight:600}
  .auth-alt{margin-top:16px;font-size:13px;color:#5A6474;text-align:center}
  .linkbtn{background:none;border:none;color:#2980B9;font-weight:700;cursor:pointer;font-size:13px;padding:0;text-decoration:underline}
  .ind-credits{background:linear-gradient(135deg,#7C3AED,#2980B9);border-radius:16px;padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;color:#fff;margin-bottom:22px;flex-wrap:wrap}
  .ind-credits-l{font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:.85;font-weight:700}
  .ind-credits-n{font-size:44px;font-weight:900;line-height:1.05}
  .ind-credits-sub{font-size:12px;opacity:.85}
  .btn-buy{background:#fff;color:#1B2A4A;border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap}
  .btn-buy:hover{opacity:.92}
  .ind-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 0 14px;flex-wrap:wrap}
  .addrow{display:flex;align-items:center;gap:12px;padding:10px 8px;border-bottom:1px solid #F0F2F5}
  .addrow:last-child{border-bottom:none}
  .addrow-ic{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
  .addrow-t{font-size:14px;font-weight:700;color:#1B2A4A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .addrow-m{font-size:12px;color:#7A8599}
  .plan-card{display:grid;grid-template-columns:1fr 1fr;gap:28px;background:#fff;border:1px solid #E8ECF0;border-radius:16px;padding:30px;box-shadow:0 4px 22px rgba(13,27,42,.07)}
  .plan-left h3{font-size:20px;font-weight:800;color:#1B2A4A;margin-bottom:10px}
  .plan-left p{font-size:14px;color:#5A6474;line-height:1.6;margin-bottom:18px}
  .plan-list{list-style:none;padding:0;margin:0}
  .plan-list li{display:flex;align-items:flex-start;gap:9px;font-size:14px;color:#2C3E50;padding:6px 0}
  .plan-list li::before{content:"✓";color:#16A34A;font-weight:800;flex-shrink:0}
  .est{background:#2980B90D;border:1px solid #2980B926;border-radius:14px;padding:22px}
  .est-title{font-size:17px;font-weight:800;color:#1B2A4A;margin-bottom:18px}
  .est-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:#374151;margin-bottom:6px}
  .est-row b{font-size:24px;font-weight:900;color:#1B2A4A}
  .est input[type=range]{width:100%;accent-color:#2980B9;margin:2px 0 4px;cursor:pointer}
  .est-disc{font-size:12px;font-weight:700;color:#16A34A;min-height:15px;margin:2px 0 4px}
  .est-perlearner{font-size:13px;color:#5A6474;margin:16px 0 8px;font-weight:600}
  .est-perlearner span{color:#9AA5B1;font-weight:400}
  .est-cost{background:#fff;border-radius:10px;padding:14px;text-align:center;display:flex;align-items:baseline;justify-content:center;gap:8px}
  .est-cost-v{font-size:34px;font-weight:900;color:#2980B9;line-height:1}
  .est-cost-u{font-size:14px;color:#7A8599;font-weight:600}
  .est-sub{font-size:12px;color:#7A8599;text-align:center;margin-top:10px}
  .plan-cta{margin-top:16px;width:100%}
  @media(max-width:680px){.plan-card{grid-template-columns:1fr;gap:22px;padding:22px}.plan-head h2{font-size:22px}}

  /* ── Auth ── */
  .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .auth-card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:460px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
  .back-sm{background:none;border:none;color:#5A6474;font-size:13px;margin-bottom:18px;padding:0}
  .auth-logo{font-size:18px;font-weight:800;margin-bottom:14px}
  .auth-title{font-size:24px;font-weight:800;margin-bottom:6px}
  .auth-sub{font-size:14px;color:#7A8599;margin-bottom:22px}
  .err{background:#E74C3C18;border:1px solid #E74C3C44;color:#922B21;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
  .ok-banner{background:#27AE6018;border:1px solid #27AE6044;color:#1A5732;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
  .fg{margin-bottom:14px}
  .fg label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px}
  .inp{width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
  .inp:focus{border-color:#2980B9}
  .btn-auth{width:100%;padding:13px;border:none;border-radius:10px;background:#1B2A4A;color:#fff;font-weight:700;font-size:15px;margin-bottom:10px}
  .btn-demo{width:100%;padding:12px;border:2px dashed #94A3B8;border-radius:10px;background:transparent;color:#5A6474;font-weight:600;font-size:14px}
  .btn-demo:hover{border-color:#2980B9;color:#2980B9}

  /* ── Dashboard shell ── */
  .dash-hdr{background:#0D1B2A;color:#fff;padding:0 24px;display:flex;align-items:center;gap:16px;height:60px;position:sticky;top:0;z-index:50}
  .dash-brand{display:flex;align-items:center;gap:10px;min-width:180px}
  .dash-logo{font-size:24px}
  .dash-org{font-size:15px;font-weight:800}
  .dash-sub{font-size:10px;color:#94A3B8}
  .dash-nav{display:flex;gap:2px;flex:1;justify-content:center;flex-wrap:wrap}
  .dash-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto;margin-left:auto}
  .nav-btn{background:transparent;border:none;color:#94A3B8;padding:8px 13px;border-radius:8px;font-size:13px;font-weight:600;transition:all .2s}
  .nav-btn.active,.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}
  .logout{background:rgba(255,255,255,.1);border:none;color:#94A3B8;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;flex:0 0 auto}
  .logout:hover{color:#fff}
  /* On narrow screens, stack the header: brand on top, Feedback + Log Out grouped at the right, nav as its own scrollable row */
  @media(max-width:760px){
    .dash-hdr{height:auto;flex-wrap:wrap;padding:10px 14px;gap:10px}
    .dash-brand{order:1;flex:1 1 auto;min-width:0}
    .dash-sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dash-actions{order:2;margin-left:auto}
    .dash-nav{order:3;flex-basis:100%;width:100%;justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto;gap:4px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
    .nav-btn{flex:0 0 auto;white-space:nowrap}
  }
  .body{padding:24px;max-width:1200px;margin:0 auto}
  .hero h1{font-size:25px;font-weight:800;margin-bottom:4px}
  .hero p{color:#5A6474;font-size:14px;margin-bottom:22px}

  /* metrics */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
  @media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}}
  .metric{background:#fff;border-radius:12px;padding:18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .metric-i{font-size:22px;margin-bottom:6px}
  .metric-v{font-size:30px;font-weight:900;margin-bottom:3px}
  .metric-l{font-size:12px;color:#7A8599;font-weight:600}

  .sec-title{font-size:16px;font-weight:800;margin:6px 0 12px}
  .cc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:8px}
  .cc{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .cc-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .cc-name{flex:1;font-size:13px;font-weight:700}
  .cc-frac{font-size:12px;font-weight:700}
  .cc-bar{height:4px;background:#E8ECF0;border-radius:2px}
  .cc-fill{height:100%;border-radius:2px;transition:width .5s}

  /* section header w/ action */
  .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .sh h2{font-size:22px;font-weight:800}
  .btn-add{padding:10px 18px;border:none;border-radius:10px;background:#1B2A4A;color:#fff;font-weight:700;font-size:13px}
  .btn-add:hover{opacity:.85}

  /* staff table */
  .table{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .thead,.trow{display:grid;grid-template-columns:2fr 1.4fr 1.1fr 1.1fr .7fr 1.4fr;padding:13px 18px;align-items:center}
  .thead{background:#F4F6F9;font-size:11px;font-weight:700;color:#7A8599;text-transform:uppercase;letter-spacing:.5px}
  .trow{border-top:1px solid #F0F2F5;font-size:13px}
  .t-name{font-weight:700}.t-email{font-size:11px;color:#7A8599;font-weight:400}
  .t-role{color:#5A6474}
  .t-pin{font-family:monospace;font-weight:700;color:#2980B9;font-size:15px}
  .pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.green{background:#27AE6018;color:#1A5732}
  .pill.amber{background:#E67E2218;color:#7D6608}
  .pill.grey{background:#E5E7EB;color:#6B7280}
  .pill.red{background:#E74C3C18;color:#922B21}
  .row-actions{display:flex;gap:6px;flex-wrap:wrap}
  .abtn{padding:5px 11px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;font-size:12px;font-weight:600;color:#374151}
  .abtn:hover{border-color:#1B2A4A;color:#1B2A4A}
  .abtn.danger{color:#E74C3C;border-color:#E74C3C33}
  .abtn.danger:hover{background:#E74C3C;color:#fff}
  .empty{padding:36px;text-align:center;color:#7A8599;font-size:14px}

  /* card form */
  .cardform{background:#F0F4F8;border:2px solid #E5E7EB;border-radius:12px;padding:20px;margin-bottom:20px}
  .cardform h3{font-size:16px;font-weight:800;margin-bottom:16px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.row2{grid-template-columns:1fr}}
  .chk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin:6px 0 14px}
  .chk{display:flex;align-items:center;gap:8px;padding:8px 10px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;cursor:pointer;background:#fff}
  .chk input{cursor:pointer}
  .chk.on{border-color:#2980B9;background:#2980B910}
  .form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:6px}
  .btn-cancel{padding:9px 18px;border:2px solid #E5E7EB;border-radius:8px;background:#fff;font-weight:600;font-size:13px;color:#5A6474}
  .btn-save{padding:9px 18px;border:none;border-radius:8px;background:#27AE60;color:#fff;font-weight:700;font-size:13px}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-h{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 22px 0}
  .modal-h h2{font-size:21px;font-weight:800;margin-bottom:3px}
  .modal-h p{font-size:13px;color:#7A8599}
  /* Feedback button + form */
  .feedback-btn{background:#fff;border:1px solid #E0E6ED;color:#1B2A4A;padding:8px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
  .feedback-btn:hover{border-color:#2980B9;color:#2980B9}
  .fb-kinds{display:flex;gap:8px;margin-bottom:14px}
  .fb-kind{flex:1;padding:11px 6px;border:2px solid #E8ECF0;border-radius:10px;background:#fff;font-size:13px;font-weight:700;color:#5A6474;cursor:pointer;transition:all .15s}
  .fb-kind:hover{border-color:#BDC3C7}
  .fb-kind.active{border-color:#2980B9;background:#2980B910;color:#1A5276}
  .fb-msg{width:100%;border:2px solid #E8ECF0;border-radius:10px;padding:12px;font-size:14px;font-family:inherit;color:#2C3E50;resize:vertical;box-sizing:border-box}
  .fb-msg:focus{outline:none;border-color:#2980B9}
  .fb-err{color:#E74C3C;font-size:13px;margin-top:8px;font-weight:600}
  .fb-send{width:100%;margin-top:14px;padding:13px;border:none;border-radius:10px;background:#2980B9;color:#fff;font-size:15px;font-weight:800;cursor:pointer}
  .fb-send:disabled{opacity:.7}
  .fb-note{font-size:11px;color:#9AA5B1;text-align:center;margin-top:10px;line-height:1.5}
  /* Super admin portal */
  .admin-badge{background:#7C3AED;color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase;vertical-align:middle}
  .astats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:24px}
  @media(max-width:640px){.astats{grid-template-columns:repeat(2,1fr)}}
  .org-grid{display:flex;flex-direction:column;gap:10px}
  .org-row{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #E8ECF0;border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .15s;text-align:left;width:100%}
  .org-row:hover{border-color:#7C3AED;box-shadow:0 4px 14px rgba(13,27,42,.08);transform:translateY(-1px)}
  .org-ava{flex:0 0 auto;width:44px;height:44px;border-radius:10px;background:#7C3AED15;color:#7C3AED;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
  .org-row-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .org-row-name{font-size:15px;font-weight:700;color:#1B2A4A}
  .org-row-meta{font-size:12px;color:#7A8599;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .org-row-stats{display:flex;gap:18px;flex:0 0 auto}
  .org-stat{text-align:center;display:flex;flex-direction:column}
  .org-stat-n{font-size:18px;font-weight:800;color:#1B2A4A}
  .org-stat-l{font-size:10px;color:#9AA5B1;text-transform:uppercase;letter-spacing:.3px}
  .pay-table{display:flex;flex-direction:column;gap:8px}
  .pay-row{display:grid;grid-template-columns:120px 1fr 90px 110px;align-items:center;gap:12px;background:#fff;border:1px solid #E8ECF0;border-radius:10px;padding:13px 16px;text-align:left;width:100%;cursor:pointer;transition:all .15s;font-size:14px}
